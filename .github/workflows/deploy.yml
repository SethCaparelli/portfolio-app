name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: seth-caparelli.com
  CF_DISTRIBUTION_IDS: E13GAAU4Z8UXZC E1Z80APPF5O8EL

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://seth-caparelli.com
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync hashed assets (immutable, 1 year)
        run: |
          aws s3 sync dist/_app "s3://${S3_BUCKET}/_app" \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync remaining static files (1 day)
        run: |
          aws s3 sync dist "s3://${S3_BUCKET}" \
            --delete \
            --exclude "_app/*" \
            --exclude "index.html" \
            --cache-control "public, max-age=86400"

      - name: Upload index.html (no-cache)
        run: |
          aws s3 cp dist/index.html "s3://${S3_BUCKET}/index.html" \
            --cache-control "no-cache, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront
        run: |
          for id in ${CF_DISTRIBUTION_IDS}; do
            echo "Invalidating $id"
            aws cloudfront create-invalidation \
              --distribution-id "$id" \
              --paths "/*" >/dev/null
          done
